<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 1rem; }
    input { width: 100%; padding: 0.6rem; margin: 0.4rem 0 1rem; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 0.7rem; background: #4f6ef7; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #3a58e0; }
    #mensaje { margin-top: 1rem; padding: 0.6rem; border-radius: 6px; display: none; }
    .exito { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    a { display: block; text-align: center; margin-top: 1rem; color: #4f6ef7; }
  </style>
</head>
<body>
  <h2>Crear cuenta</h2>
  <div id="mensaje"></div>
  <input type="text" id="username" placeholder="Nombre de usuario">
  <input type="password" id="password" placeholder="Contrasena">
  <button onclick="registrar()">Registrarse</button>
  <a href="/login.html">Ya tengo cuenta</a>

  <script src="client.js"></script>
</body>
</html>
